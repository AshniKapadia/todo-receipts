<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Slip</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@1,600&family=Space+Grotesk:wght@400;500;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #EFE0C4;
      --dark:    #1C0F08;
      --red:     #C4341E;
      --olive:   #566228;
      --tan:     #C8A060;
      --surface: #FAF3E3;
      --border:  #D0BFA0;
      --text:    #1C0F08;
      --muted:   #9A845E;
      --yellow:  #E4B840;
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
    }

    .app {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    /* ─────────────── Sidebar ─────────────── */
    .sidebar {
      width: 220px;
      background: var(--dark);
      color: #fff;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .sidebar-brand {
      padding: 28px 20px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .mascot-small {
      width: 54px;
      height: auto;
      margin-bottom: 12px;
      display: block;
    }

    .brand-name {
      font-family: 'Bebas Neue', cursive;
      letter-spacing: 3px;
      line-height: 1;
    }

    .brand-the {
      display: block;
      font-size: 16px;
      color: var(--red);
      letter-spacing: 7px;
      margin-bottom: 1px;
    }

    .brand-slip {
      display: block;
      font-size: 54px;
      color: var(--surface);
      line-height: 0.88;
    }

    .brand-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--tan);
      letter-spacing: 0.3px;
      margin-top: 10px;
      display: block;
    }

    /* Profile switcher */
    .profile-switcher {
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      gap: 7px;
    }

    .profile-pill {
      flex: 1;
      padding: 7px 0;
      border-radius: 3px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: transparent;
      color: rgba(255,255,255,0.3);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .profile-pill:hover {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.22);
    }
    .profile-pill.active {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    /* Nav tabs */
    .list-tabs {
      padding: 10px 0;
      flex: 1;
    }

    .list-tab {
      display: flex;
      align-items: center;
      gap: 11px;
      width: 100%;
      padding: 12px 20px;
      background: none;
      border: none;
      border-left: 4px solid transparent;
      color: rgba(255,255,255,0.3);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      text-align: left;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }
    .list-tab:hover {
      color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.04);
    }
    .list-tab.active {
      border-left-color: var(--red);
      color: #fff;
      background: rgba(196, 52, 30, 0.15);
    }

    .tab-icon {
      font-size: 13px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
    }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
      font-size: 8px;
      color: rgba(255,255,255,0.1);
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ─────────────── Main ─────────────── */
    .main {
      flex: 1;
      background: var(--surface);
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        rgba(150, 130, 90, 0.09) 27px,
        rgba(150, 130, 90, 0.09) 28px
      );
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Topbar */
    .topbar {
      background: var(--surface);
      border-bottom: 3px solid var(--dark);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .topbar-eyebrow {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 3.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1px;
    }

    .topbar-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 38px;
      color: var(--dark);
      letter-spacing: 5px;
      line-height: 1;
    }

    .print-btn {
      padding: 11px 24px;
      background: var(--red);
      color: #fff;
      border: 2.5px solid var(--dark);
      border-radius: 3px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 3px 3px 0 var(--dark);
    }
    .print-btn:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--dark); }
    .print-btn:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 var(--dark); }
    .print-btn:disabled { background: var(--muted); box-shadow: none; cursor: not-allowed; transform: none; border-color: var(--muted); }

    /* Date strip */
    .date-strip {
      background: var(--bg);
      border-bottom: 3px solid var(--dark);
      padding: 12px 32px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .date-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 14px;
      border-radius: 3px;
      border: 2px solid transparent;
      cursor: pointer;
      background: none;
      min-width: 58px;
      transition: all 0.12s;
      font-family: 'Space Grotesk', sans-serif;
    }
    .date-chip:hover { background: rgba(196,52,30,0.07); border-color: var(--red); }

    .date-chip .day-name {
      font-size: 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 700;
    }

    .date-chip .day-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      color: var(--dark);
      line-height: 1.2;
      letter-spacing: 1px;
    }

    .date-chip.today .day-num {
      background: var(--red);
      color: #fff;
      border-radius: 3px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .date-chip.selected {
      border-color: var(--dark);
      background: var(--yellow);
      box-shadow: 2px 2px 0 var(--dark);
    }

    /* Content area */
    .content {
      padding: 24px 32px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Error */
    .error {
      background: #fde8e8;
      border: 2px solid var(--dark);
      padding: 10px 16px;
      border-radius: 3px;
      color: #c33;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      box-shadow: 2px 2px 0 var(--dark);
    }

    /* Add form */
    .add-form {
      background: #fff;
      border: 2.5px solid var(--dark);
      border-radius: 5px;
      padding: 18px 20px;
      box-shadow: 4px 4px 0 var(--dark);
    }

    .add-form-label {
      display: block;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .add-input {
      flex: 1;
      padding: 11px 16px;
      border: 2px solid var(--border);
      border-radius: 3px;
      font-size: 14px;
      font-family: 'Courier Prime', monospace;
      background: var(--surface);
      color: var(--text);
      transition: border-color 0.15s, background 0.15s;
    }
    .add-input::placeholder { color: var(--border); font-style: italic; }
    .add-input:focus { outline: none; border-color: var(--dark); background: #fff; }

    .time-input {
      width: 84px;
      padding: 11px 10px;
      border: 2px solid var(--border);
      border-radius: 3px;
      font-size: 13px;
      font-family: 'Courier Prime', monospace;
      background: var(--surface);
      color: var(--text);
      text-align: center;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .time-input::placeholder { color: var(--border); }
    .time-input:focus { outline: none; border-color: var(--dark); background: #fff; }

    .add-btn {
      padding: 11px 22px;
      background: var(--dark);
      color: var(--surface);
      border: 2px solid var(--dark);
      border-radius: 3px;
      font-size: 11px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    }
    .add-btn:hover  { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(0,0,0,0.3); }
    .add-btn:active { transform: translate(1px,1px);   box-shadow: 1px 1px 0 rgba(0,0,0,0.3); }

    /* Suggestion chips */
    .suggestions-row { display: flex; flex-wrap: wrap; gap: 5px; }

    .suggestion-chip {
      padding: 3px 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      font-size: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .suggestion-chip:hover { background: var(--surface); color: var(--text); border-color: var(--dark); }

    /* Tasks section */
    .tasks-section {
      background: #fff;
      border: 2.5px solid var(--dark);
      border-radius: 5px;
      overflow: hidden;
      flex: 1;
      box-shadow: 4px 4px 0 var(--dark);
    }

    .tasks-header {
      padding: 11px 20px;
      border-bottom: 2.5px solid var(--dark);
      font-family: 'Bebas Neue', cursive;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 4px;
      background: var(--bg);
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      cursor: move;
      transition: background 0.1s, border-left-color 0.1s;
      border-left: 3px solid transparent;
    }
    .task-item:last-child  { border-bottom: none; }
    .task-item:hover       { background: #fefbf5; border-left-color: var(--tan); }
    .task-item.dragging    { opacity: 0.4; }
    .task-item.drag-over   { border-top: 2px solid var(--red); }

    .drag-handle {
      color: var(--border);
      cursor: grab;
      font-size: 13px;
      user-select: none;
      flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }

    .task-checkbox {
      width: 16px;
      height: 16px;
      cursor: pointer;
      flex-shrink: 0;
      accent-color: var(--red);
    }

    .task-title {
      flex: 1;
      font-size: 14px;
      font-family: 'Courier Prime', monospace;
      font-weight: 400;
      color: var(--text);
      word-break: break-word;
      cursor: pointer;
      letter-spacing: 0.3px;
    }

    .task-completed .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-time {
      font-size: 10px;
      font-weight: 700;
      color: var(--red);
      background: rgba(196,52,30,0.07);
      border: 1.5px solid var(--red);
      border-radius: 2px;
      padding: 2px 8px;
      flex-shrink: 0;
      white-space: nowrap;
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .task-delete {
      padding: 3px 7px;
      background: none;
      border: none;
      color: var(--border);
      font-size: 13px;
      cursor: pointer;
      border-radius: 2px;
      flex-shrink: 0;
      line-height: 1;
      transition: all 0.1s;
    }
    .task-delete:hover { color: var(--red); background: rgba(196,52,30,0.08); }

    .edit-input {
      flex: 1;
      padding: 6px 10px;
      border: 2px solid var(--red);
      border-radius: 3px;
      font-size: 14px;
      font-family: 'Courier Prime', monospace;
      background: #fff;
      color: var(--text);
    }
    .edit-input:focus { outline: none; }

    .task-save-btn, .task-cancel-btn {
      padding: 5px 11px;
      border-radius: 2px;
      cursor: pointer;
      font-size: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      flex-shrink: 0;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .task-save-btn   { background: var(--dark); color: var(--surface); border: 2px solid var(--dark); }
    .task-cancel-btn { background: var(--surface); color: var(--muted); border: 2px solid var(--border); }

    /* Empty state */
    .empty-state {
      padding: 56px 40px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .empty-mascot { width: 88px; height: auto; opacity: 0.55; }

    .empty-text {
      font-family: 'Bebas Neue', cursive;
      font-size: 20px;
      letter-spacing: 4px;
      color: var(--border);
    }

    .empty-sub {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--muted);
      opacity: 0.7;
    }

    /* ─────────────── CARS View ─────────────── */
    .cars-view {
      display: none;
      padding: 24px 32px;
      flex: 1;
    }

    .cars-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .cars-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 28px;
      letter-spacing: 6px;
      color: var(--dark);
    }

    .cars-refresh-btn {
      padding: 7px 16px;
      background: none;
      border: 2px solid var(--dark);
      border-radius: 3px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--dark);
      transition: background 0.12s;
    }
    .cars-refresh-btn:hover { background: var(--bg); }

    .cars-weeks {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .cars-week {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .cars-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
    }

    .cars-circle {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      border: 3px solid var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier Prime', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--dark);
      box-shadow: 3px 3px 0 var(--dark);
    }

    .cars-circle.green  { background: #5DBB63; color: var(--dark); }
    .cars-circle.yellow { background: var(--yellow); color: var(--dark); }
    .cars-circle.red    { background: var(--red); color: #fff; }

    .cars-date {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .cars-loading {
      padding: 48px 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─────────────── Period Tracker ─────────────── */
    .period-view {
      display: none;
      flex: 1;
      flex-direction: column;
    }

    .period-year-bar {
      background: var(--bg);
      border-bottom: 3px solid var(--dark);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .period-nav-btn {
      padding: 5px 13px;
      background: none;
      border: 2px solid var(--border);
      border-radius: 3px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      color: var(--dark);
      transition: all 0.12s;
    }
    .period-nav-btn:hover { border-color: var(--dark); }

    .period-year-label {
      font-family: 'Bebas Neue', cursive;
      font-size: 18px;
      letter-spacing: 5px;
      color: var(--dark);
      flex: 1;
    }

    /* Year grid */
    .period-year-grid {
      padding: 24px 32px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px 28px;
    }

    .period-month-name {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
      font-family: 'Space Grotesk', sans-serif;
    }

    .period-cal-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 2px;
    }

    .period-weekday-label {
      font-size: 7px;
      text-align: center;
      color: var(--border);
      font-weight: 700;
      padding: 1px 0;
      font-family: 'Space Grotesk', sans-serif;
    }

    .period-day-circle {
      aspect-ratio: 1;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9.5px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.1s;
      position: relative;
    }
    .period-day-circle:hover { background: rgba(196,52,30,0.1); color: var(--dark); }
    .period-day-circle.empty { visibility: hidden; pointer-events: none; }

    .period-day-circle.period-day { background: var(--red); color: #fff; font-weight: 700; }
    .period-day-circle.period-day:hover { background: #b02c19; }

    .period-day-circle.predicted { background: rgba(196,52,30,0.12); color: var(--red); }

    /* tiny olive dot below number for ovulation window */
    .period-day-circle.ovulation::after {
      content: '';
      position: absolute;
      bottom: 1px;
      left: 50%;
      transform: translateX(-50%);
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--olive);
    }

    .period-day-circle.today              { box-shadow: 0 0 0 1.5px var(--dark); color: var(--dark); font-weight: 700; }
    .period-day-circle.period-day.today   { box-shadow: 0 0 0 2px rgba(255,255,255,0.55); }
    .period-day-circle.selected           { box-shadow: 0 0 0 2px var(--dark) !important; background: var(--yellow) !important; color: var(--dark) !important; }

    /* Period detail area (log + history) */
    .period-content {
      padding: 0 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Chips for log panel */
    .flow-pills   { display: flex; gap: 5px; flex-wrap: wrap; }
    .symptom-grid { display: flex; gap: 5px; flex-wrap: wrap; }

    .flow-pill, .symptom-chip {
      padding: 3px 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      font-size: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .flow-pill:hover,    .symptom-chip:hover    { background: var(--surface); color: var(--text); border-color: var(--dark); }
    .flow-pill.active                            { background: var(--red);   border-color: var(--red);   color: #fff; }
    .symptom-chip.active                         { background: var(--olive); border-color: var(--olive); color: #fff; }

    .log-actions { display: flex; gap: 8px; margin-top: 10px; }

    .log-save-btn {
      padding: 11px 22px;
      background: var(--dark);
      color: var(--surface);
      border: 2px solid var(--dark);
      border-radius: 3px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .log-save-btn:hover  { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 rgba(0,0,0,0.3); }
    .log-save-btn:active { transform: translate(1px,1px);   box-shadow: 1px 1px 0 rgba(0,0,0,0.3); }

    .log-clear-btn {
      padding: 11px 18px;
      background: none;
      color: var(--muted);
      border: 2px solid var(--border);
      border-radius: 3px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: all 0.12s;
    }
    .log-clear-btn:hover { border-color: var(--red); color: var(--red); }

    /* History */
    .period-run-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
    }
    .period-run-item:last-child  { border-bottom: none; }
    .period-run-date             { flex: 1; font-size: 14px; font-family: 'Courier Prime', monospace; color: var(--text); }
    .period-run-symptoms         { font-size: 9.5px; color: var(--muted); font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.5px; text-align: right; max-width: 220px; }

    /* ─────────────── TV Rankings ─────────────── */
    .tv-view {
      display: none;
      flex-direction: column;
      flex: 1;
      background: #080808;
      overflow-y: auto;
    }

    .tv-inner {
      width: 100%;
      padding: 0 0 80px;
    }

    .tv-controls-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid #1e1e1e;
      position: sticky;
      top: 0;
      background: #080808;
      z-index: 10;
    }

    .tv-counts { display: flex; align-items: baseline; gap: 6px; }
    .tv-big-num {
      font-family: 'Bebas Neue', cursive;
      font-size: 36px;
      line-height: 1;
      color: #C9A84C;
    }
    .tv-big-num.tv-dim { color: #2a2a2a; }
    .tv-big-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      font-weight: 600;
    }
    .tv-big-label.tv-dim { color: #222; }
    .tv-big-sep { color: #222; font-size: 20px; margin: 0 2px; }

    .tv-btns { display: flex; gap: 8px; }
    .tv-btn {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 7px 16px;
      border: 1px solid #222;
      background: transparent;
      color: #555;
      cursor: pointer;
      transition: all 0.12s;
    }
    .tv-btn:hover { border-color: #C9A84C; color: #C9A84C; background: rgba(201,168,76,0.06); }
    .tv-btn-accent { border-color: #C9A84C; color: #C9A84C; }
    .tv-btn-accent:hover { background: rgba(201,168,76,0.15); }

    .tv-top-drop {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: transparent;
      border-bottom: 1px solid #111;
      transition: all 0.15s;
      cursor: default;
    }
    .tv-top-drop.tv-drop-active {
      background: rgba(201,168,76,0.07);
      border-bottom-color: #C9A84C;
      color: #C9A84C;
    }

    /* Ranked list items */
    .tv-ranked-list { list-style: none; }

    .tv-item {
      display: flex;
      align-items: center;
      border-bottom: 1px solid #111;
      cursor: grab;
      transition: background 0.15s;
      min-height: 130px;
      position: relative;
    }
    .tv-item:hover { background: rgba(255,255,255,0.02); }
    .tv-item.tv-dragging { opacity: 0.25; }

    .tv-item.tv-drop-top::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: #C9A84C;
    }
    .tv-item.tv-drop-bottom::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: #C9A84C;
    }

    .tv-rank {
      font-family: 'Bebas Neue', cursive;
      font-size: 80px;
      line-height: 1;
      width: 110px;
      min-width: 110px;
      text-align: right;
      padding-right: 22px;
      color: #1a1a1a;
      transition: color 0.3s;
      user-select: none;
    }
    .tv-item:hover .tv-rank { color: #2e2318; }

    .tv-poster {
      width: 80px;
      min-width: 80px;
      height: 120px;
      background: #111;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .tv-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.8) saturate(0.8);
      transition: filter 0.3s, transform 0.3s;
      display: block;
    }
    .tv-item:hover .tv-poster img {
      filter: brightness(1.05) saturate(1.05);
      transform: scale(1.06);
    }
    /* Spotlight on hover */
    .tv-poster::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at var(--mx,50%) var(--my,40%),
        rgba(255,248,210,0.18) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.35s;
      pointer-events: none;
    }
    .tv-item:hover .tv-poster::after { opacity: 1; }

    .tv-poster-ph {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #2a2a2a;
      text-align: center;
      padding: 6px;
      line-height: 1.5;
    }

    .tv-glow {
      position: absolute;
      left: 110px;
      top: 50%;
      transform: translateY(-50%);
      width: 120px;
      height: 180px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.35s;
    }
    .tv-item:hover .tv-glow { opacity: 1; }

    .tv-info {
      flex: 1;
      padding: 16px 20px 16px 18px;
      position: relative;
      z-index: 1;
    }
    .tv-show-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(18px, 2.2vw, 28px);
      font-weight: 700;
      font-style: italic;
      color: #c8c0b2;
      line-height: 1.2;
      transition: color 0.2s;
    }
    .tv-item:hover .tv-show-name { color: #ede9e0; }
    .tv-item-rank-label {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #333;
      margin-top: 4px;
    }

    .tv-remove {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: #2a2a2a;
      font-size: 15px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
      margin-right: 12px;
    }
    .tv-item:hover .tv-remove { opacity: 1; }
    .tv-remove:hover { color: #C4341E; }

    /* Unranked pool */
    .tv-unranked-section {
      padding: 32px 40px;
      border-top: 1px solid #141414;
    }
    .tv-section-label {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #333;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tv-unranked-badge {
      font-family: 'Bebas Neue', cursive;
      font-size: 18px;
      color: #C9A84C;
      line-height: 1;
    }

    .tv-pool {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .tv-pool-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      cursor: grab;
      transition: transform 0.15s;
    }
    .tv-pool-card:hover { transform: translateY(-4px); }
    .tv-pool-card.tv-dragging { opacity: 0.25; }

    .tv-pool-poster {
      width: 100px;
      height: 150px;
      background: #0e0e0e;
      overflow: hidden;
      position: relative;
      flex-shrink: 0;
    }
    .tv-pool-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.6) saturate(0.5);
      transition: filter 0.25s;
      display: block;
    }
    .tv-pool-card:hover .tv-pool-poster img {
      filter: brightness(0.9) saturate(0.9);
    }
    .tv-pool-poster::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 30%,
        rgba(255,248,210,0.12) 0%, transparent 65%);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .tv-pool-card:hover .tv-pool-poster::after { opacity: 1; }

    .tv-pool-poster-ph {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      color: #2a2a2a;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-align: center;
      padding: 4px;
      line-height: 1.5;
    }

    .tv-pool-title {
      font-size: 8px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #555;
      max-width: 100px;
      text-align: center;
      line-height: 1.4;
    }

    /* Ranked list empty state */
    .tv-empty {
      padding: 60px 32px;
      text-align: center;
      color: #222;
    }
    .tv-empty p {
      font-family: 'Bebas Neue', cursive;
      font-size: 22px;
      letter-spacing: 4px;
    }
    .tv-empty span {
      font-size: 10px;
      letter-spacing: 0.1em;
      display: block;
      margin-top: 6px;
      color: #1a1a1a;
    }

    /* ─────────────── Mobile ─────────────── */
    .mobile-profiles { display: none; }
    .mobile-nav      { display: none; }
    .mobile-tab-label { font-size: 9px; letter-spacing: 1px; }

    @media (max-width: 640px) {
      /* Prevent any horizontal overflow */
      body, .app { overflow-x: hidden; }

      /* Hide desktop sidebar */
      .sidebar { display: none; }

      /* Give room for fixed bottom nav */
      .main { padding-bottom: 68px; min-height: 100dvh; overflow-x: hidden; }

      /* Topbar */
      .topbar { padding: 11px 16px; gap: 10px; }
      .topbar-title { font-size: 22px; letter-spacing: 2px; }
      .print-btn {
        padding: 9px 12px;
        font-size: 16px;
        letter-spacing: 0;
        flex-shrink: 0;
        box-shadow: 2px 2px 0 var(--dark);
      }
      .print-label { display: none; }

      /* Profile strip below topbar */
      .mobile-profiles {
        display: flex;
        gap: 8px;
        padding: 10px 16px;
        background: var(--bg);
        border-bottom: 2.5px solid var(--dark);
        flex-shrink: 0;
      }
      .mobile-profiles .profile-pill {
        border-color: rgba(28,15,8,0.18);
        color: rgba(28,15,8,0.4);
      }
      .mobile-profiles .profile-pill.active {
        background: var(--red);
        border-color: var(--red);
        color: #fff;
      }

      /* Date strip */
      .date-strip { padding: 10px 12px; }

      /* Content */
      .content { padding: 14px 16px; gap: 14px; }

      /* Add form: task input full-width, time+add on second line */
      .add-row { flex-wrap: wrap; }
      .add-input { flex-basis: 100%; min-width: 0; }
      .time-input { flex: 1; min-width: 0; width: auto; text-align: left; }
      .add-btn { flex-shrink: 0; }

      /* Empty state */
      .empty-state { padding: 36px 24px; }

      /* Task items: bigger tap targets, no overflow */
      .task-item { padding: 14px 12px; }
      .drag-handle { display: none; }
      .task-title { min-width: 0; }

      /* Period view mobile */
      .period-year-bar  { padding: 8px 16px; }
      .period-year-grid { padding: 14px 16px; gap: 16px 10px; grid-template-columns: repeat(3, 1fr); }
      .period-content   { padding: 0 16px 16px; gap: 14px; }

      /* Fixed bottom nav */
      .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 64px;
        background: var(--dark);
        border-top: 3px solid rgba(255,255,255,0.08);
        z-index: 200;
      }

      .mobile-nav .list-tab {
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        padding: 6px 2px;
        width: auto;
        border-left: none;
        border-bottom: 3px solid transparent;
        font-size: 8px;
        letter-spacing: 1px;
      }
      .mobile-nav .list-tab .tab-icon { font-size: 17px; width: auto; }
      .mobile-nav .list-tab.active {
        border-left-color: transparent;
        border-bottom-color: var(--red);
        background: rgba(196,52,30,0.18);
        color: #fff;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">
      <div class="sidebar-brand">

        <!-- Mascot: SLIP the receipt printer -->
        <svg class="mascot-small" viewBox="-12 -2 104 97" xmlns="http://www.w3.org/2000/svg">
          <!-- receipt paper -->
          <rect x="28" y="0" width="24" height="42" rx="2" fill="#FAF3E3" stroke="#FAF3E3" stroke-width="1"/>
          <line x1="33" y1="11" x2="47" y2="11" stroke="#C8A060" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="33" y1="18" x2="47" y2="18" stroke="#C8A060" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="33" y1="25" x2="44" y2="25" stroke="#C8A060" stroke-width="1.5" stroke-linecap="round"/>
          <!-- body -->
          <rect x="6" y="33" width="68" height="55" rx="8" fill="#C4341E" stroke="#FAF3E3" stroke-width="1.5"/>
          <!-- paper slot -->
          <rect x="18" y="32" width="44" height="8" rx="2" fill="rgba(0,0,0,0.22)"/>
          <!-- eyes -->
          <circle cx="29" cy="57" r="7.5" fill="#1C0F08"/>
          <circle cx="51" cy="57" r="7.5" fill="#1C0F08"/>
          <circle cx="31"  cy="55" r="2.5" fill="white"/>
          <circle cx="53"  cy="55" r="2.5" fill="white"/>
          <!-- smile -->
          <path d="M25 70 Q40 81 55 70" stroke="#1C0F08" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <!-- arms -->
          <path d="M6 51 L-4 63 L2 68"  stroke="#FAF3E3" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M74 51 L84 63 L78 68" stroke="#FAF3E3" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>

        <div class="brand-name">
          <span class="brand-the">THE</span>
          <span class="brand-slip">SLIP</span>
        </div>
        <span class="brand-tagline">your day, printed</span>
      </div>

      <nav class="list-tabs" id="list-tabs">
        <button class="list-tab active" data-category="todo"   onclick="switchCategory('todo')"><span class="tab-icon">☐</span>To Do</button>
        <button class="list-tab"        data-category="cars"   onclick="switchCategory('cars')">CARS</button>
        <button class="list-tab"        data-category="period" onclick="switchCategory('period')"><span class="tab-icon">◌</span>Cycle</button>
        <button class="list-tab"        data-category="tv"     onclick="switchCategory('tv')"><span class="tab-icon">▶</span>The List</button>
      </nav>

      <div class="sidebar-footer">The Slip · todo-receipts</div>
    </aside>

    <!-- ── Main ── -->
    <main class="main">

      <div class="topbar">
        <div class="topbar-left">
          <span class="topbar-eyebrow" id="topbar-date"></span>
          <div class="topbar-title">TO-DO LIST</div>
        </div>
        <button class="print-btn" id="print-btn" onclick="printReceipt()">🖨 <span class="print-label">Print Receipt</span></button>
      </div>

      <div class="date-strip" id="date-strip"></div>

      <div class="content">
        <div id="error-container"></div>

        <div class="add-form">
          <span class="add-form-label">New Task</span>
          <div class="add-row">
            <input
              type="text" id="add-input" class="add-input"
              placeholder="what needs doing today?"
              maxlength="200" list="suggestions-list" autocomplete="off"
            />
            <input
              type="text" id="time-input" class="time-input"
              placeholder="time" maxlength="10"
              title="Time estimate (e.g. 30m, 1h)"
            />
            <button class="add-btn" onclick="addTask()">Add</button>
          </div>
          <datalist id="suggestions-list"></datalist>
          <div class="suggestions-row" id="suggestion-chips"></div>
        </div>

        <div class="tasks-section">
          <div class="tasks-header" id="tasks-header">Tasks</div>
          <div id="tasks-list">
            <div class="empty-state">
              <!-- muted version of mascot for empty state -->
              <svg class="empty-mascot" viewBox="-12 -2 104 97" xmlns="http://www.w3.org/2000/svg">
                <rect x="28" y="0" width="24" height="42" rx="2" fill="#E8D8BC" stroke="#D0BFA0" stroke-width="1.5"/>
                <line x1="33" y1="11" x2="47" y2="11" stroke="#D0BFA0" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="33" y1="18" x2="47" y2="18" stroke="#D0BFA0" stroke-width="1.5" stroke-linecap="round"/>
                <line x1="33" y1="25" x2="44" y2="25" stroke="#D0BFA0" stroke-width="1.5" stroke-linecap="round"/>
                <rect x="6" y="33" width="68" height="55" rx="8" fill="#D0BFA0" stroke="#C4B090" stroke-width="1.5"/>
                <rect x="18" y="32" width="44" height="8" rx="2" fill="rgba(0,0,0,0.1)"/>
                <circle cx="29" cy="57" r="7.5" fill="#B8A880"/>
                <circle cx="51" cy="57" r="7.5" fill="#B8A880"/>
                <circle cx="31"  cy="55" r="2.5" fill="rgba(255,255,255,0.5)"/>
                <circle cx="53"  cy="55" r="2.5" fill="rgba(255,255,255,0.5)"/>
                <path d="M27 70 Q40 78 53 70" stroke="#B8A880" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                <path d="M6 51 L-4 63 L2 68"  stroke="#C4B090" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M74 51 L84 63 L78 68" stroke="#C4B090" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <div class="empty-text">Nothing Here Yet</div>
              <div class="empty-sub">add a task above to get started</div>
            </div>
          </div>
        </div>

      </div>

      <!-- ── Period Tracker View ── -->
      <div class="period-view" id="period-view">

        <!-- Year nav -->
        <div class="period-year-bar">
          <button class="period-nav-btn" onclick="shiftPeriodYear(-1)">←</button>
          <span class="period-year-label" id="period-year-label">2026</span>
          <button class="period-nav-btn" onclick="shiftPeriodYear(1)">→</button>
        </div>

        <!-- 12-month circle grid -->
        <div class="period-year-grid" id="period-year-grid"></div>

        <!-- Log + history -->
        <div class="period-content">

          <div class="add-form" id="period-log-panel" style="display:none">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
              <span class="add-form-label" id="log-panel-date" style="margin:0">SELECT A DATE ABOVE</span>
              <button class="task-delete" style="font-size:14px" onclick="closePeriodLogPanel()">✕</button>
            </div>

            <span class="add-form-label">Flow</span>
            <div class="flow-pills" style="margin-bottom:14px">
              <button class="flow-pill" data-flow="none"     onclick="selectFlow('none')">None</button>
              <button class="flow-pill" data-flow="spotting" onclick="selectFlow('spotting')">Spotting</button>
              <button class="flow-pill" data-flow="light"    onclick="selectFlow('light')">Light</button>
              <button class="flow-pill" data-flow="medium"   onclick="selectFlow('medium')">Medium</button>
              <button class="flow-pill" data-flow="heavy"    onclick="selectFlow('heavy')">Heavy</button>
            </div>

            <span class="add-form-label">Symptoms</span>
            <div class="symptom-grid" style="margin-bottom:14px">
              <button class="symptom-chip" data-symptom="cramps"        onclick="toggleSymptom('cramps')">Cramps</button>
              <button class="symptom-chip" data-symptom="bloating"       onclick="toggleSymptom('bloating')">Bloating</button>
              <button class="symptom-chip" data-symptom="headache"       onclick="toggleSymptom('headache')">Headache</button>
              <button class="symptom-chip" data-symptom="fatigue"        onclick="toggleSymptom('fatigue')">Fatigue</button>
              <button class="symptom-chip" data-symptom="mood-swings"    onclick="toggleSymptom('mood-swings')">Mood Swings</button>
              <button class="symptom-chip" data-symptom="back-pain"      onclick="toggleSymptom('back-pain')">Back Pain</button>
              <button class="symptom-chip" data-symptom="tender-breasts" onclick="toggleSymptom('tender-breasts')">Tender Breasts</button>
              <button class="symptom-chip" data-symptom="acne"           onclick="toggleSymptom('acne')">Acne</button>
              <button class="symptom-chip" data-symptom="insomnia"       onclick="toggleSymptom('insomnia')">Insomnia</button>
              <button class="symptom-chip" data-symptom="nausea"         onclick="toggleSymptom('nausea')">Nausea</button>
            </div>

            <div class="log-actions">
              <button class="log-save-btn"  onclick="savePeriodEntry()">Save</button>
              <button class="log-clear-btn" onclick="clearPeriodEntry()">Clear Day</button>
            </div>
          </div>

          <div class="tasks-section">
            <div class="tasks-header" id="period-history-header">Period History</div>
            <div id="period-history-list">
              <div class="empty-state">
                <div class="empty-text">No logs yet</div>
                <div class="empty-sub">tap any day to start logging</div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- ── TV Rankings View ── -->
      <div class="tv-view" id="tv-view" style="display:none">
        <div class="tv-inner">

          <div class="tv-controls-bar">
            <div class="tv-counts">
              <span class="tv-big-num" id="tv-ranked-count">0</span>
              <span class="tv-big-label">ranked</span>
              <span class="tv-big-sep">/</span>
              <span class="tv-big-num tv-dim" id="tv-total-count">32</span>
              <span class="tv-big-label tv-dim">total</span>
            </div>
            <div class="tv-btns">
              <button class="tv-btn" onclick="tvReset()">↺ Reset</button>
              <button class="tv-btn tv-btn-accent" onclick="tvCopy()">↗ Copy</button>
            </div>
          </div>

          <!-- Drop zone for rank #1 -->
          <div class="tv-top-drop" id="tv-top-drop" data-pos="0">↑ drop here for #1</div>

          <!-- Ranked list -->
          <ul class="tv-ranked-list" id="tv-ranked-list"></ul>

          <!-- Unranked pool -->
          <div class="tv-unranked-section">
            <div class="tv-section-label">
              UNRANKED
              <span class="tv-unranked-badge" id="tv-unranked-count">32</span>
            </div>
            <div class="tv-pool" id="tv-pool"></div>
          </div>

        </div>

      <!-- ── CARS View ── -->
      <div class="cars-view" id="cars-view">
        <div class="cars-header">
          <span class="cars-title">CARS SCORES</span>
          <button class="cars-refresh-btn" onclick="fetchCarsData()">↻ Refresh</button>
        </div>
        <div id="cars-grid"></div>
      </div>

    </main>

  </div>

  <!-- Mobile-only bottom nav -->
  <nav class="mobile-nav">
    <button class="list-tab active" data-category="todo"   onclick="switchCategory('todo')"><span class="tab-icon">☐</span><span class="mobile-tab-label">To Do</span></button>
    <button class="list-tab"        data-category="cars"   onclick="switchCategory('cars')"><span class="mobile-tab-label">CARS</span></button>
    <button class="list-tab"        data-category="period" onclick="switchCategory('period')"><span class="tab-icon">◌</span><span class="mobile-tab-label">Cycle</span></button>
    <button class="list-tab"        data-category="tv"     onclick="switchCategory('tv')"><span class="tab-icon">▶</span><span class="mobile-tab-label">The List</span></button>
  </nav>

  <script>
    const _d = new Date();
    document.getElementById('topbar-date').textContent =
      _d.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase() + ' · ' +
      _d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }).toUpperCase();
  </script>
  <script src="/dashboard.js"></script>

  <!-- ── TV Rankings ── -->
  <script>
  (() => {
    const TV_SHOWS = [
      "The Office","New Girl","Modern Family","Superstore","Parks and Rec",
      "The Good Place","Brooklyn Nine-Nine","Scrubs","How I Met Your Mother",
      "How I Met Your Father","Adults","Life in Pieces","Young & Hungry",
      "Schitt's Creek","Ted Lasso","American Auto","Scandal","Gilmore Girls",
      "The Mindy Project","Never Have I Ever","Sex Lives of College Girls",
      "Kim's Convenience","The Middle","Friends","House of Cards","30 Rock",
      "Veep","Silicon Valley","The Pitt","Arrested Development",
      "Animal Control","Avatar",
      "Grey's Anatomy","The West Wing","Bridgerton","Black-ish","Suits",
      "Nobody Wants This","Man on the Inside","The Ranch","The Diplomat",
      "Running Point","Lucifer","Gossip Girl","Owning Manhattan","You",
      "One Day","How to Make It in America",
      "Raising Hope","American Housewife","Home Economics","The Rookie",
      "Abbott Elementary"
    ];

    // TVmaze search name overrides
    const TVMAZE_NAMES = {
      "Parks and Rec":   "Parks and Recreation",
      "Grey's Anatomy":  "Grey's Anatomy",
      "Black-ish":       "Black-ish",
      "One Day":         "One Day",
    };

    // Direct TVmaze show IDs — bypasses search entirely for accuracy
    const TVMAZE_IDS = {
      "Avatar":  139,   // Avatar: The Last Airbender (Nickelodeon cartoon)
    };

    // For shows where search might grab a wrong result, filter by network
    const TVMAZE_NETWORK = {
      "Scandal":       "ABC",
      "Gossip Girl":   "The CW",
      "You":           "Netflix",
      "Lucifer":       "Netflix",
    };

    const TV_STATE_KEY  = 'tv-list-v4';
    const TV_POSTER_KEY = 'tv-posters-v3';

    let tvRanked   = [];
    let tvUnranked = [...TV_SHOWS];
    let tvPosters  = {};
    let tvDragSrc  = null;
    let tvDragType = null;
    let tvInitialized = false;

    // ── Init ──────────────────────────────────────────
    function tvInit() {
      if (tvInitialized) return;
      tvInitialized = true;
      try { tvPosters = JSON.parse(localStorage.getItem(TV_POSTER_KEY) || '{}'); } catch(e) {}
      const saved = localStorage.getItem(TV_STATE_KEY);
      if (saved) {
        try {
          const d = JSON.parse(saved);
          tvRanked   = (d.ranked || []).filter(s => TV_SHOWS.includes(s));
          const rs   = new Set(tvRanked);
          tvUnranked = TV_SHOWS.filter(s => !rs.has(s));
        } catch(e) { tvResetState(); }
      }
      tvRender();
      tvFetchMissing();
    }

    function tvResetState() {
      tvRanked   = [];
      tvUnranked = [...TV_SHOWS];
    }

    function tvSave() {
      localStorage.setItem(TV_STATE_KEY, JSON.stringify({ ranked: tvRanked }));
    }

    // ── Poster fetching (TVmaze) ──────────────────────
    async function tvFetchMissing() {
      const missing = TV_SHOWS.filter(s => !(s in tvPosters));
      for (let i = 0; i < missing.length; i++) {
        const show = missing[i];
        tvPosters[show] = await tvFetchOnePoster(show);
        localStorage.setItem(TV_POSTER_KEY, JSON.stringify(tvPosters));
        tvUpdatePosterInDOM(show);
        if (i % 6 === 5) await new Promise(r => setTimeout(r, 250));
      }
    }

    async function tvFetchOnePoster(show) {
      try {
        // 1. Direct ID lookup (most accurate)
        if (TVMAZE_IDS[show]) {
          const res  = await fetch(`https://api.tvmaze.com/shows/${TVMAZE_IDS[show]}`);
          const data = await res.json();
          return data?.image?.medium || null;
        }
        // 2. Network-filtered search (avoid wrong show with same title)
        if (TVMAZE_NETWORK[show]) {
          const network = TVMAZE_NETWORK[show];
          const name    = TVMAZE_NAMES[show] || show;
          const res     = await fetch(`https://api.tvmaze.com/search/shows?q=${encodeURIComponent(name)}`);
          const results = await res.json();
          const match   = results.find(r =>
            r.show?.network?.name === network || r.show?.webChannel?.name === network
          );
          return (match?.show ?? results[0]?.show)?.image?.medium || null;
        }
        // 3. Regular singlesearch
        const name = TVMAZE_NAMES[show] || show;
        const res  = await fetch(`https://api.tvmaze.com/singlesearch/shows?q=${encodeURIComponent(name)}`);
        const data = await res.json();
        return data?.image?.medium || null;
      } catch(e) {
        return null;
      }
    }

    function tvUpdatePosterInDOM(show) {
      const url = tvPosters[show];
      if (!url) return;
      // Ranked item
      const ph = document.querySelector(`[data-tv-show="${CSS.escape(show)}"] .tv-poster-ph`);
      if (ph) {
        const img = document.createElement('img'); img.src = url; img.alt = show;
        ph.replaceWith(img);
      } else {
        const img = document.querySelector(`[data-tv-show="${CSS.escape(show)}"] .tv-poster img`);
        if (img) img.src = url;
      }
      // Pool card
      const pph = document.querySelector(`[data-tv-pool="${CSS.escape(show)}"] .tv-pool-poster-ph`);
      if (pph) {
        const img = document.createElement('img'); img.src = url; img.alt = show;
        pph.replaceWith(img);
      } else {
        const img = document.querySelector(`[data-tv-pool="${CSS.escape(show)}"] .tv-pool-poster img`);
        if (img) img.src = url;
      }
    }

    // ── Render ────────────────────────────────────────
    function tvRender() {
      tvRenderList();
      tvRenderPool();
      tvUpdateCounts();
    }

    function tvRenderList() {
      const list = document.getElementById('tv-ranked-list');
      list.innerHTML = '';
      if (tvRanked.length === 0) {
        list.innerHTML = `<li class="tv-empty"><p>Nothing ranked yet</p><span>Click a poster below or drag it up here</span></li>`;
        return;
      }
      tvRanked.forEach((show, idx) => {
        const li  = document.createElement('li');
        li.className    = 'tv-item';
        li.draggable    = true;
        li.dataset.tvShow = show;
        li.dataset.idx  = idx;
        const url = tvPosters[show];
        const posterHtml = url
          ? `<img src="${url}" alt="${show}">`
          : `<div class="tv-poster-ph">${show}</div>`;
        li.innerHTML = `
          <div class="tv-glow"></div>
          <div class="tv-rank">${idx + 1}</div>
          <div class="tv-poster">${posterHtml}</div>
          <div class="tv-info">
            <div class="tv-show-name">${show}</div>
            <div class="tv-item-rank-label">rank #${idx + 1}</div>
          </div>
          <button class="tv-remove" title="Unrank" onclick="tvRemove('${show.replace(/'/g,"\\'")}')">×</button>
        `;
        // Spotlight
        li.addEventListener('mousemove', e => {
          const w = li.querySelector('.tv-poster');
          const r = w.getBoundingClientRect();
          w.style.setProperty('--mx', ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%');
          w.style.setProperty('--my', ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%');
        });
        // Drag
        li.addEventListener('dragstart', e => {
          tvDragSrc = show; tvDragType = 'ranked';
          li.classList.add('tv-dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', show);
        });
        li.addEventListener('dragend', () => { li.classList.remove('tv-dragging'); tvClearDropHints(); });
        li.addEventListener('dragover', e => {
          e.preventDefault();
          const mid = li.getBoundingClientRect().top + li.getBoundingClientRect().height / 2;
          tvClearDropHints();
          li.classList.add(e.clientY < mid ? 'tv-drop-top' : 'tv-drop-bottom');
        });
        li.addEventListener('dragleave', () => tvClearDropHints());
        li.addEventListener('drop', e => {
          e.preventDefault();
          const s = e.dataTransfer.getData('text/plain');
          const mid = li.getBoundingClientRect().top + li.getBoundingClientRect().height / 2;
          tvDropOnItem(s, idx, e.clientY < mid);
          tvClearDropHints();
        });
        list.appendChild(li);
      });
    }

    function tvRenderPool() {
      const pool = document.getElementById('tv-pool');
      pool.innerHTML = '';
      if (tvUnranked.length === 0) {
        pool.innerHTML = '<span style="font-size:10px;color:#333;letter-spacing:0.1em;font-style:italic">All shows ranked ✓</span>';
        return;
      }
      tvUnranked.forEach(show => {
        const card = document.createElement('div');
        card.className = 'tv-pool-card';
        card.draggable = true;
        card.dataset.tvPool = show;
        const url = tvPosters[show];
        const ph = url
          ? `<img src="${url}" alt="${show}">`
          : `<div class="tv-pool-poster-ph">${show}</div>`;
        card.innerHTML = `
          <div class="tv-pool-poster">${ph}</div>
          <div class="tv-pool-title">${show}</div>
        `;
        card.addEventListener('click', () => tvAddToBottom(show));
        card.addEventListener('dragstart', e => {
          tvDragSrc = show; tvDragType = 'unranked';
          card.classList.add('tv-dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', show);
        });
        card.addEventListener('dragend', () => { card.classList.remove('tv-dragging'); tvClearDropHints(); });
        pool.appendChild(card);
      });
    }

    // ── Drop logic ────────────────────────────────────
    function tvDropOnItem(show, targetIdx, before) {
      const fi = tvRanked.indexOf(show);
      tvRanked   = tvRanked.filter(s => s !== show);
      tvUnranked = tvUnranked.filter(s => s !== show);
      let at = targetIdx;
      if (fi !== -1 && fi < targetIdx) at = Math.max(0, targetIdx - 1);
      if (!before) at += 1;
      at = Math.max(0, Math.min(at, tvRanked.length));
      tvRanked.splice(at, 0, show);
      tvSave(); tvRender();
    }

    function tvAddToBottom(show) {
      tvUnranked = tvUnranked.filter(s => s !== show);
      tvRanked.push(show);
      tvSave(); tvRender();
      setTimeout(() => {
        const el = document.querySelector(`[data-tv-show="${CSS.escape(show)}"]`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
    }

    function tvClearDropHints() {
      document.querySelectorAll('.tv-drop-top,.tv-drop-bottom').forEach(el => {
        el.classList.remove('tv-drop-top','tv-drop-bottom');
      });
    }

    // Top drop zone (#1)
    const topDrop = document.getElementById('tv-top-drop');
    topDrop.addEventListener('dragover', e => { e.preventDefault(); topDrop.classList.add('tv-drop-active'); });
    topDrop.addEventListener('dragleave', () => topDrop.classList.remove('tv-drop-active'));
    topDrop.addEventListener('drop', e => {
      e.preventDefault();
      const show = e.dataTransfer.getData('text/plain');
      topDrop.classList.remove('tv-drop-active');
      if (!show) return;
      tvRanked   = tvRanked.filter(s => s !== show);
      tvUnranked = tvUnranked.filter(s => s !== show);
      tvRanked.unshift(show);
      tvSave(); tvRender();
    });

    // Allow drop anywhere on list (fallback)
    document.getElementById('tv-ranked-list').addEventListener('dragover', e => e.preventDefault());
    document.getElementById('tv-ranked-list').addEventListener('drop', e => {
      e.preventDefault();
      if (e.target.id === 'tv-ranked-list') {
        const show = e.dataTransfer.getData('text/plain');
        if (!show) return;
        tvRanked   = tvRanked.filter(s => s !== show);
        tvUnranked = tvUnranked.filter(s => s !== show);
        tvRanked.push(show);
        tvSave(); tvRender();
      }
    });

    // ── Actions ───────────────────────────────────────
    function tvRemove(show) {
      tvRanked   = tvRanked.filter(s => s !== show);
      if (!tvUnranked.includes(show)) tvUnranked.push(show);
      tvSave(); tvRender();
    }

    function tvUpdateCounts() {
      document.getElementById('tv-ranked-count').textContent  = tvRanked.length;
      document.getElementById('tv-total-count').textContent   = TV_SHOWS.length;
      document.getElementById('tv-unranked-count').textContent = tvUnranked.length;
    }

    window.tvReset = function() {
      if (!confirm('Clear all TV rankings?')) return;
      tvResetState(); tvSave(); tvRender();
    };

    window.tvCopy = function() {
      if (!tvRanked.length) return;
      const lines = ['★ ASHNI\'S TV RANKINGS\n'];
      tvRanked.forEach((s, i) => lines.push(`${i + 1}. ${s}`));
      if (tvUnranked.length) lines.push(`\nUnranked: ${tvUnranked.join(', ')}`);
      navigator.clipboard.writeText(lines.join('\n'))
        .then(() => { /* silent success */ })
        .catch(() => {});
    };

    // Hook into switchCategory to lazy-init
    const _origSwitch = window.switchCategory;
    window.switchCategory = function(cat) {
      _origSwitch(cat);
      if (cat === 'tv') tvInit();
    };
  })();
  </script>
